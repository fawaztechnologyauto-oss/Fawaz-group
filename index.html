<!DOCTYPE html>

<style>
body {
    margin: 0;

    background-color: #f4f6f9;
}

header {
    background: #0f172a;
    color: white;
    padding: 40px 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 32px;
}

.section {
    padding: 50px 20px;
    text-align: center;
}

.section h2 {
    margin-bottom: 30px;
    color: #0f172a;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

    max-width: 1100px;
    margin: auto;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card p {
    padding: 10px;
    margin: 0;
    font-size: 14px;
    background: #f1f5f9;
}

.whatsapp {
    text-align: center;
    padding: 40px;
}

.whatsapp a {
    background: #25D366;
    color: white;
    padding: 15px 25px;
    text-decoration: none;
    font-size: 18px;
    border-radius: 8px;
}

footer {
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 14px;
}
</style>
</head>

<body>

<section class="section">
